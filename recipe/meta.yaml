{% set name = "quantiphyse-perfsim" %}
{% set version = "0.0.2.post12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/quantiphyse-perfsim-{{ version }}.tar.gz
  sha256: e0f1656dcb6eb9fe00bc67ab550303b3a5de1bc743a12e78c3885bebd62b5c30

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - numpy
    - python >={{ python_min }}
    - quantiphyse-fabber

test:
  requires:
    - python {{ python_min }}
  imports:
    - quantiphyse_perfsim

about:
  home: https://quantiphyse.readthedocs.io/
  summary: Quantiphyse plugin for simulating perfusion data
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mcraig-ibme
